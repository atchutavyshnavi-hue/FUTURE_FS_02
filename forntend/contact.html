<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact Us · Sample Business Website</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/public.css" />
</head>
<body>
  <div class="contact-wrap">
    <div class="contact-brand">
      <div class="contact-brand-mark">A</div>
      <div class="contact-brand-name">Acme Studio</div>
    </div>

    <div class="contact-card">
      <h1>Let's talk about your project</h1>
      <p class="sub">
        This is a sample business website contact form. Submitting it creates a new lead
        in the Mini CRM — exactly like a real client inquiry would.
      </p>

      <div class="form-error" id="formError"></div>
      <div class="form-success" id="formSuccess"></div>

      <form id="contactForm">
        <div class="form-group">
          <label for="name">Full name *</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" />
        </div>
        <div class="form-group">
          <label for="company">Company</label>
          <input type="text" id="company" name="company" />
        </div>
        <div class="form-group">
          <label for="message">What do you need help with?</label>
          <textarea id="message" name="message" placeholder="Tell us a bit about your project…"></textarea>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Send message</button>
      </form>

      <div class="pipeline-hint">
        <span class="pulse-dot"></span>
        Your message goes straight to our team's lead pipeline
      </div>
    </div>

    <a href="login.html" class="admin-link">Admin login →</a>
  </div>

  <script src="js/api.js"></script>
  <script src="js/contact.js"></script>
</body>
</html>
