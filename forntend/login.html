<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login · Mini CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-mark">L</div>
        <div>
          <div class="brand-name">Mini CRM</div>
          <div class="brand-sub">Lead management</div>
        </div>
      </div>

      <h1>Admin sign in</h1>
      <p class="sub">Only admins can view and manage leads.</p>

      <div class="login-error" id="loginError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; padding:11px;" id="loginBtn">
          Sign in
        </button>
      </form>

      <p class="login-hint">
        Demo admin (set in backend/.env): <br />
        <span class="mono">admin@minicrm.com</span> / <span class="mono">ChangeMe123!</span>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
